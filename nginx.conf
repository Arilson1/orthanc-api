worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    # Default is 1MB, far too small for DICOM instance/study uploads (STOW-RS
    # or the Orthanc web UI) — study ZIPs and uncompressed images routinely
    # exceed that.
    client_max_body_size 4096M;

    server {
        listen 8042;

        location / {
            # Orthanc has no built-in CORS support (deliberate upstream design
            # decision) — the DICOMweb plugin config has no CORS keys either, so
            # this reverse proxy is what actually adds the headers the browser
            # needs to talk to Orthanc directly from MedView's origin.
            if ($request_method = OPTIONS) {
                add_header 'Access-Control-Allow-Origin' '*' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Origin, X-Requested-With, Content-Type, Accept, Authorization' always;
                add_header 'Access-Control-Max-Age' 1728000 always;
                add_header 'Content-Length' 0;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                return 204;
            }

            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Origin, X-Requested-With, Content-Type, Accept, Authorization' always;

            proxy_pass http://127.0.0.1:8043;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
    }
}
